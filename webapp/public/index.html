<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iOS Signing Portal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --jti-green: #00a03b;
      --jti-green-dark: #00802f;
      --jti-green-light: #e6f6ec;
      --ink: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --bg: #f7faf8;
      --danger: #dc2626;
      --danger-bg: #fef2f2;
      --info: #0369a1;
      --info-bg: #f0f9ff;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 0% 0%, rgba(0,160,59,0.08), transparent 40%),
        radial-gradient(circle at 100% 100%, rgba(0,160,59,0.06), transparent 40%),
        var(--bg);
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 32px;
      background: #fff;
      border-bottom: 1px solid var(--line);
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      font-size: 17px;
      letter-spacing: -0.01em;
    }
    .brand .dot {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: linear-gradient(135deg, var(--jti-green), var(--jti-green-dark));
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 0.02em;
    }
    .user {
      font-size: 13px;
      color: var(--muted);
    }
    .user a { color: var(--jti-green-dark); text-decoration: none; font-weight: 500; }
    .user a:hover { text-decoration: underline; }

    main {
      max-width: 720px;
      margin: 48px auto;
      padding: 0 20px;
    }

    .hero { margin-bottom: 28px; }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
    }

    .card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 32px;
      box-shadow: 0 1px 2px rgba(15,23,42,0.04), 0 8px 24px rgba(15,23,42,0.04);
    }

    .drop-zone {
      position: relative;
      border: 2px dashed var(--line);
      border-radius: 12px;
      padding: 36px 20px;
      text-align: center;
      transition: all 0.18s ease;
      background: #fafcfb;
      cursor: pointer;
    }
    .drop-zone:hover,
    .drop-zone.dragover {
      border-color: var(--jti-green);
      background: var(--jti-green-light);
    }
    .drop-zone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .drop-zone .icon {
      width: 44px;
      height: 44px;
      margin: 0 auto 12px;
      border-radius: 12px;
      background: var(--jti-green-light);
      color: var(--jti-green-dark);
      display: grid;
      place-items: center;
    }
    .drop-zone .icon svg { width: 22px; height: 22px; }
    .drop-zone .primary {
      font-weight: 600;
      font-size: 15px;
      color: var(--ink);
    }
    .drop-zone .primary span { color: var(--jti-green-dark); }
    .drop-zone .hint {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
    }
    .drop-zone .file-name {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #fff;
      border: 1px solid var(--line);
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      color: var(--ink);
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 24px;
    }
    @media (max-width: 520px) {
      .field-row { grid-template-columns: 1fr; }
    }

    label {
      display: block;
      font-weight: 500;
      font-size: 13px;
      margin-bottom: 6px;
      color: var(--ink);
    }

    select, input[type=text] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      background: #fff;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
      color: var(--ink);
    }
    select:focus, input[type=text]:focus {
      outline: none;
      border-color: var(--jti-green);
      box-shadow: 0 0 0 3px rgba(0,160,59,0.15);
    }
    input[type=text]:disabled {
      background: #f8fafc;
      color: var(--muted);
    }

    button.primary {
      margin-top: 28px;
      width: 100%;
      background: var(--jti-green);
      color: #fff;
      border: 0;
      padding: 13px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s ease, transform 0.05s ease;
    }
    button.primary:hover:not(:disabled) { background: var(--jti-green-dark); }
    button.primary:active:not(:disabled) { transform: translateY(1px); }
    button.primary:disabled {
      background: #94a3b8;
      cursor: not-allowed;
    }

    .status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
      line-height: 1.5;
    }
    .status.success {
      background: var(--jti-green-light);
      color: var(--jti-green-dark);
      border: 1px solid rgba(0,160,59,0.25);
      display: block;
    }
    .status.error {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid rgba(220,38,38,0.2);
      display: block;
    }
    .status.info {
      background: var(--info-bg);
      color: var(--info);
      border: 1px solid rgba(3,105,161,0.2);
      display: block;
    }
    .status a { color: inherit; font-weight: 600; }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: -2px;
      margin-right: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer {
      text-align: center;
      padding: 32px 20px;
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="dot">JTI</div>
      <span>iOS Signing Portal</span>
    </div>
    <div class="user" id="userInfo">Loading…</div>
  </header>

  <main>
    <div class="hero">
      <h1>Upload your build</h1>
      <p>Drop an <strong>.ipa</strong> or <strong>.xcarchive.zip</strong> from your vendor. The signing pipeline will be triggered automatically once the upload completes.</p>
    </div>

    <div class="card">
      <form id="uploadForm">
        <label for="artifact">Artifact</label>
        <div class="drop-zone" id="dropZone">
          <input type="file" id="artifact" name="artifact" accept=".ipa,.zip" required />
          <div class="icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
              <polyline points="17 8 12 3 7 8" />
              <line x1="12" y1="3" x2="12" y2="15" />
            </svg>
          </div>
          <div class="primary">Drop your file here or <span>browse</span></div>
          <div class="hint">.ipa or .xcarchive.zip up to 2 GB</div>
          <div class="file-name" id="fileName" style="display:none;"></div>
        </div>

        <div class="field-row">
          <div>
            <label for="versionAction">Version action</label>
            <select id="versionAction" name="versionAction">
              <option value="none">No change</option>
              <option value="patch">Bump patch</option>
              <option value="minor">Bump minor</option>
              <option value="major">Bump major</option>
              <option value="manual">Manual</option>
            </select>
          </div>
          <div>
            <label for="manualVersion">Manual version</label>
            <input type="text" id="manualVersion" name="manualVersion" placeholder="e.g. 1.2.3" disabled />
          </div>
        </div>

        <button type="submit" class="primary" id="submitBtn">Upload &amp; trigger pipeline</button>
      </form>

      <div id="status" class="status"></div>
    </div>
  </main>

  <footer>JTI &middot; Mobile DevOps</footer>

  <script>
    fetch('/api/me')
      .then(r => r.ok ? r.json() : null)
      .then(u => {
        const el = document.getElementById('userInfo');
        if (u) {
          el.innerHTML = `Signed in as <strong>${u.name}</strong> &middot; <a href="/auth/logout">Sign out</a>`;
        } else {
          el.innerHTML = `<a href="/auth/login">Sign in</a>`;
        }
      });

    const dz = document.getElementById('dropZone');
    const fileInput = document.getElementById('artifact');
    const fileNameEl = document.getElementById('fileName');

    ['dragenter', 'dragover'].forEach(ev =>
      dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.add('dragover'); })
    );
    ['dragleave', 'drop'].forEach(ev =>
      dz.addEventListener(ev, e => { e.preventDefault(); dz.classList.remove('dragover'); })
    );
    dz.addEventListener('drop', e => {
      if (e.dataTransfer.files.length) {
        fileInput.files = e.dataTransfer.files;
        showFileName();
      }
    });
    fileInput.addEventListener('change', showFileName);

    function showFileName() {
      const f = fileInput.files[0];
      if (f) {
        fileNameEl.style.display = 'inline-flex';
        fileNameEl.textContent = `${f.name} (${(f.size / 1024 / 1024).toFixed(1)} MB)`;
      }
    }

    const actionEl = document.getElementById('versionAction');
    const manualEl = document.getElementById('manualVersion');
    actionEl.addEventListener('change', () => {
      manualEl.disabled = actionEl.value !== 'manual';
      if (manualEl.disabled) manualEl.value = '';
    });

    const form = document.getElementById('uploadForm');
    const status = document.getElementById('status');
    const btn = document.getElementById('submitBtn');
    let pollTimer = null;

    function setStatus(kind, html) {
      status.className = 'status ' + kind;
      status.innerHTML = html;
    }

    async function pollRun(buildId, runUrl) {
      try {
        const r = await fetch(`/api/runs/${buildId}/status`);
        const data = await r.json();
        if (!r.ok) throw new Error(data.error || 'Status check failed');

        const runLink = runUrl ? ` <a href="${runUrl}" target="_blank">View run #${buildId} &rarr;</a>` : '';

        if (data.status !== 'completed') {
          setStatus('info', `<span class="spinner"></span> Pipeline ${data.status}&hellip;${runLink}`);
          pollTimer = setTimeout(() => pollRun(buildId, runUrl), 8000);
          return;
        }

        if (data.result === 'succeeded') {
          setStatus(
            'success',
            `Pipeline succeeded. <a href="/api/runs/${buildId}/download" download>Download signed IPA &darr;</a>${runLink}`
          );
        } else {
          setStatus('error', `Pipeline ended with result: <strong>${data.result}</strong>.${runLink}`);
        }
        btn.disabled = false;
        btn.textContent = 'Upload & trigger pipeline';
      } catch (err) {
        setStatus('error', 'Status check failed: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Upload & trigger pipeline';
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Uploading&hellip;';
      setStatus('info', 'Uploading&hellip; this may take a few minutes for large files.');

      const fd = new FormData(form);
      try {
        const res = await fetch('/api/upload', { method: 'POST', body: fd });
        const data = await res.json();
        if (!res.ok) throw new Error(typeof data.error === 'string' ? data.error : JSON.stringify(data.error));

        const buildId = data.run?.id;
        const runUrl = data.run?.url;
        if (!buildId) throw new Error('No run id returned from pipeline trigger');

        setStatus('info', `<span class="spinner"></span> Upload complete. Waiting for pipeline&hellip;`);
        form.reset();
        fileNameEl.style.display = 'none';
        manualEl.disabled = true;
        pollRun(buildId, runUrl);
      } catch (err) {
        setStatus('error', 'Error: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Upload & trigger pipeline';
      }
    });
  </script>
</body>
</html>
